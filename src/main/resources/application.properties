spring.application.name=grabtitude

spring.datasource.url=jdbc:mysql://localhost:3306/grabtitude
spring.datasource.username = ${DB_USERNAME}
spring.datasource.password = ${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true

sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.sender.email=${SENDGRID_SENDER_MAIL}
sendgrid.sender.name=Grabtitude Support

admin.verification.mail=${ADMIN_VERIFICATION_MAIL}

# CORS configuration
app.cors.allowed-origins=http://localhost:5173

# Custom Swagger path
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/docs
